.form-range::-moz-range-track {

.form-range::-moz-range-thumb {

.form-range:focus-visible::-moz-range-thumb {

.form-range:disabled {

.btn:not(.btn-primary, .viz-tile):is(

svg {

#widget &gt; svg {

&lt;script&gt;
  (function () {
    var root = document.getElementById(&quot;philabantay-system-atlas&quot;);
    var svg = root.querySelector(&quot;.atlas-svg&quot;);
    var content = document.getElementById(&quot;atlas-svg-content&quot;);
    var detail = document.getElementById(&quot;atlas-detail&quot;);
    var mobile = document.getElementById(&quot;atlas-mobile&quot;);
    var title = document.getElementById(&quot;atlas-svg-title&quot;);
    var desc = document.getElementById(&quot;atlas-svg-desc&quot;);
    var statusNames = {
      current: &quot;Current&quot;,
      partial: &quot;Partial&quot;,
      planned: &quot;Planned&quot;,
      decision: &quot;Decision&quot;
    };

    function escapeText(value) {
      return String(value)
        .replace(/&amp;/g, &quot;&amp;amp;&quot;)
        .replace(/&lt;/g, &quot;&amp;lt;&quot;)
        .replace(/&gt;/g, &quot;&amp;gt;&quot;)
        .replace(/&quot;/g, &quot;&amp;quot;&quot;)
        .replace(/&#x27;/g, &quot;&amp;#039;&quot;);
    }

    function textLines(lines, x, y, className, lineGap, anchor) {
      var values = Array.isArray(lines) ? lines : [lines];
      var out = &#x27;&lt;text class=&quot;&#x27; + className + &#x27;&quot; x=&quot;&#x27; + x + &#x27;&quot; y=&quot;&#x27; + y + &#x27;&quot; text-anchor=&quot;&#x27; + (anchor || &quot;start&quot;) + &#x27;&quot;&gt;&#x27;;
      values.forEach(function (line, index) {
        out += &#x27;&lt;tspan x=&quot;&#x27; + x + &#x27;&quot; dy=&quot;&#x27; + (index === 0 ? 0 : lineGap) + &#x27;&quot;&gt;&#x27; + escapeText(line) + &#x27;&lt;/tspan&gt;&#x27;;
      });
      return out + &quot;&lt;/text&gt;&quot;;
    }

    function nodeMarkup(node) {
      var shape;
      if (node.shape === &quot;diamond&quot;) {
        var cx = node.x + node.w / 2;
        var cy = node.y + node.h / 2;
        shape = &#x27;&lt;polygon class=&quot;node-shape&quot; points=&quot;&#x27; +
          cx + &quot;,&quot; + node.y + &quot; &quot; +
          (node.x + node.w) + &quot;,&quot; + cy + &quot; &quot; +
          cx + &quot;,&quot; + (node.y + node.h) + &quot; &quot; +
          node.x + &quot;,&quot; + cy + &#x27;&quot;&gt;&lt;/polygon&gt;&#x27;;
      } else {
        shape = &#x27;&lt;rect class=&quot;node-shape&quot; x=&quot;&#x27; + node.x + &#x27;&quot; y=&quot;&#x27; + node.y + &#x27;&quot; width=&quot;&#x27; + node.w + &#x27;&quot; height=&quot;&#x27; + node.h + &#x27;&quot; rx=&quot;10&quot;&gt;&lt;/rect&gt;&#x27;;
      }

      var titleX = node.shape === &quot;diamond&quot; ? node.x + node.w / 2 : node.x + 18;
      var titleY = node.y + (node.shape === &quot;diamond&quot; ? 36 : 28);
      var anchor = node.shape === &quot;diamond&quot; ? &quot;middle&quot; : &quot;start&quot;;
      var titleGap = 18;
      var titleLinesValue = Array.isArray(node.title) ? node.title : [node.title];
      var copyY = titleY + (titleLinesValue.length * titleGap) + 8;
      var markX = node.shape === &quot;diamond&quot; ? node.x + node.w / 2 : node.x + 12;
      var markY = node.shape === &quot;diamond&quot; ? node.y + node.h - 20 : node.y + node.h - 15;
      var statusX = node.shape === &quot;diamond&quot; ? node.x + node.w / 2 : node.x + node.w - 12;
      var statusAnchor = node.shape === &quot;diamond&quot; ? &quot;middle&quot; : &quot;end&quot;;

      return &#x27;&lt;g class=&quot;node &#x27; + node.status + &#x27;&quot;&gt;&#x27; +
        shape +
        &#x27;&lt;circle class=&quot;status-mark &#x27; + node.status + &#x27;&quot; cx=&quot;&#x27; + markX + &#x27;&quot; cy=&quot;&#x27; + markY + &#x27;&quot; r=&quot;5&quot;&gt;&lt;/circle&gt;&#x27; +
        textLines(titleLinesValue, titleX, titleY, &quot;node-title&quot;, titleGap, anchor) +
        (node.copy ? textLines(node.copy, node.shape === &quot;diamond&quot; ? node.x + node.w / 2 : node.x + 18, copyY, &quot;node-copy text-small&quot;, 16, anchor) : &quot;&quot;) +
        textLines(statusNames[node.status], statusX, node.y + node.h - 11, &quot;node-status text-small&quot;, 14, statusAnchor) +
        &quot;&lt;/g&gt;&quot;;
    }

    function edgePoints(from, to) {
      var fromCx = from.x + from.w / 2;
      var fromCy = from.y + from.h / 2;
      var toCx = to.x + to.w / 2;
      var toCy = to.y + to.h / 2;
      var dx = toCx - fromCx;
      var dy = toCy - fromCy;
      var start;
      var end;

      if (Math.abs(dx) &gt;= Math.abs(dy)) {
        start = { x: dx &gt;= 0 ? from.x + from.w : from.x, y: fromCy };
        end = { x: dx &gt;= 0 ? to.x : to.x + to.w, y: toCy };
      } else {
        start = { x: fromCx, y: dy &gt;= 0 ? from.y + from.h : from.y };
        end = { x: toCx, y: dy &gt;= 0 ? to.y : to.y + to.h };
      }
      return { start: start, end: end };
    }

    function edgeMarkup(edge, nodeMap) {
      var from = nodeMap[edge.from];
      var to = nodeMap[edge.to];
      var points = edgePoints(from, to);
      var start = points.start;
      var end = points.end;
      var horizontal = Math.abs(end.x - start.x) &gt;= Math.abs(end.y - start.y);
      var path;

      if (horizontal) {
        var midX = (start.x + end.x) / 2;
        path = &quot;M &quot; + start.x + &quot; &quot; + start.y + &quot; C &quot; + midX + &quot; &quot; + start.y + &quot;, &quot; + midX + &quot; &quot; + end.y + &quot;, &quot; + end.x + &quot; &quot; + end.y;
      } else {
        var midY = (start.y + end.y) / 2;
        path = &quot;M &quot; + start.x + &quot; &quot; + start.y + &quot; C &quot; + start.x + &quot; &quot; + midY + &quot;, &quot; + end.x + &quot; &quot; + midY + &quot;, &quot; + end.x + &quot; &quot; + end.y;
      }

      var labelX = (start.x + end.x) / 2 + (edge.labelDx || 0);
      var labelY = (start.y + end.y) / 2 - 7 + (edge.labelDy || 0);
      return &#x27;&lt;path class=&quot;edge&quot; d=&quot;&#x27; + path + &#x27;&quot; marker-end=&quot;url(#atlas-arrow)&quot;&gt;&lt;/path&gt;&#x27; +
        (edge.label ? textLines(edge.label, labelX, labelY, &quot;edge-label text-small&quot;, 14, &quot;middle&quot;) : &quot;&quot;);
    }

    function graphMarkup(view) {
      var map = {};
      view.nodes.forEach(function (node) {
        map[node.id] = node;
      });
      var out = &#x27;&lt;defs&gt;&lt;marker id=&quot;atlas-arrow&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;9&quot; refY=&quot;5&quot; markerWidth=&quot;6&quot; markerHeight=&quot;6&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M 0 0 L 10 5 L 0 10 z&quot; fill=&quot;var(--muted-foreground)&quot;&gt;&lt;/path&gt;&lt;/marker&gt;&lt;/defs&gt;&#x27;;
      view.edges.forEach(function (edge) {
        out += edgeMarkup(edge, map);
      });
      view.nodes.forEach(function (node) {
        out += nodeMarkup(node);
      });
      return out;
    }

    function clusterMarkup(cluster) {
      var out = &#x27;&lt;g class=&quot;cluster&quot;&gt;&#x27;;
      out += &#x27;&lt;rect class=&quot;cluster-shape&quot; x=&quot;&#x27; + cluster.x + &#x27;&quot; y=&quot;&#x27; + cluster.y + &#x27;&quot; width=&quot;&#x27; + cluster.w + &#x27;&quot; height=&quot;&#x27; + cluster.h + &#x27;&quot; rx=&quot;12&quot;&gt;&lt;/rect&gt;&#x27;;
      out += textLines(cluster.title, cluster.x + 16, cluster.y + 27, &quot;cluster-title&quot;, 16, &quot;start&quot;);
      out += &#x27;&lt;line class=&quot;cluster-divider&quot; x1=&quot;&#x27; + (cluster.x + 14) + &#x27;&quot; y1=&quot;&#x27; + (cluster.y + 39) + &#x27;&quot; x2=&quot;&#x27; + (cluster.x + cluster.w - 14) + &#x27;&quot; y2=&quot;&#x27; + (cluster.y + 39) + &#x27;&quot;&gt;&lt;/line&gt;&#x27;;
      var columns = cluster.columns || 1;
      var perColumn = Math.ceil(cluster.items.length / columns);
      cluster.items.forEach(function (item, index) {
        var column = Math.floor(index / perColumn);
        var row = index % perColumn;
        var itemX = cluster.x + 16 + column * ((cluster.w - 32) / columns);
        var itemY = cluster.y + 62 + row * 23;
        out += &#x27;&lt;circle class=&quot;status-mark &#x27; + (item.status || &quot;current&quot;) + &#x27;&quot; cx=&quot;&#x27; + itemX + &#x27;&quot; cy=&quot;&#x27; + (itemY - 4) + &#x27;&quot; r=&quot;4&quot;&gt;&lt;/circle&gt;&#x27;;
        out += textLines(item.label, itemX + 11, itemY, &quot;cluster-item text-small&quot;, 14, &quot;start&quot;);
      });
      return out + &quot;&lt;/g&gt;&quot;;
    }

    function databaseMarkup() {
      var clusters = [
        {

            { label: &quot;auth.users&quot; },

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
